<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="robots" content="noindex, nofollow, nosnippet, noarchive">
    <meta name="googlebot" content="noindex, nofollow">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Hasu Store - Cửa hàng trực tuyến</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#004aad;--primary-dark:#003a8c;--primary-light:#e8f0fb;--accent:#ffca08;--accent-dark:#e6b600;--text:#1a1a2e;--text-secondary:#6b7280;--bg:#f8fafc;--card:#fff;--border:#e5e7eb;--danger:#ef4444;--success:#22c55e;--orange:#f97316;--purple:#8b5cf6;--pink:#ec4899;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);--shadow-lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -4px rgba(0,0,0,.04);--radius:12px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
        a{text-decoration:none;color:inherit}

        /* ANIMATIONS */
        @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        @keyframes countdown{from{transform:scaleY(1)}to{transform:scaleY(0)}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        @keyframes slideRight{from{transform:translateX(-100%)}to{transform:translateX(0)}}
        .fade-in{animation:fadeInUp .5s ease both}
        .fade-in-delay{animation:fadeInUp .5s ease .15s both}

        /* HEADER */
        .store-header{background:var(--primary);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,74,173,.2)}
        .hdr-promo{background:linear-gradient(90deg,#ff6b35,#f7c948,#ff6b35);background-size:200% 100%;animation:shimmer 3s linear infinite;text-align:center;padding:6px;font-size:12px;font-weight:600;color:#1a1a2e;letter-spacing:.3px}
        .hdr-promo i{margin-right:4px}
        .hdr-main{display:flex;align-items:center;padding:0 40px;height:60px;gap:24px}
        .store-logo{font-size:24px;font-weight:900;color:#fff;display:flex;align-items:center;gap:10px;flex-shrink:0}
        .store-logo img{width:36px;height:36px;border-radius:8px}
        .hdr-search{flex:1;max-width:560px;position:relative}
        .hdr-search input{width:100%;padding:10px 18px 10px 42px;border:2px solid rgba(255,255,255,.2);border-radius:24px;font-size:13.5px;outline:none;background:rgba(255,255,255,.12);color:#fff;font-family:inherit;transition:all .2s}
        .hdr-search input::placeholder{color:rgba(255,255,255,.6)}
        .hdr-search input:focus{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4)}
        .hdr-search i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.6);font-size:14px}
        .hdr-right{display:flex;align-items:center;gap:20px;margin-left:auto}
        .hdr-link{color:rgba(255,255,255,.85);font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:color .15s;white-space:nowrap}
        .hdr-link:hover{color:#fff}
        .hdr-link i{font-size:16px}
        .cart-btn{position:relative;background:rgba(255,255,255,.15);border:none;color:#fff;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s}
        .cart-btn:hover{background:rgba(255,255,255,.25);transform:scale(1.08)}
        .cart-count{position:absolute;top:-2px;right:-2px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:2px solid var(--primary)}

        /* CAT NAV */
        .cat-nav{background:rgba(0,0,0,.12);display:flex;align-items:center;padding:0 40px;gap:0;overflow-x:auto}
        .cat-nav::-webkit-scrollbar{display:none}
        .cat-link{padding:11px 20px;color:rgba(255,255,255,.8);font-size:13px;font-weight:500;white-space:nowrap;transition:all .15s;border-bottom:2px solid transparent;cursor:pointer}
        .cat-link:hover{color:#fff;background:rgba(255,255,255,.06)}
        .cat-link.active{color:#fff;border-bottom-color:var(--accent);font-weight:600}

        /* HERO BANNER SLIDER */
        .hero-slider{position:relative;width:100%;overflow:hidden}
        .hero-track{display:flex;transition:transform .5s ease}
        .hero-slide{min-width:100%;position:relative;height:380px;display:flex;align-items:center;overflow:hidden}
        .hero-slide-bg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden}
        .hero-slide-content{position:relative;z-index:2;padding:50px 60px;max-width:560px;color:#fff}
        .hero-slide-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);backdrop-filter:blur(10px);padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:14px;border:1px solid rgba(255,255,255,.25)}
        .hero-slide h2{font-size:34px;font-weight:900;line-height:1.18;margin-bottom:10px;text-shadow:0 2px 10px rgba(0,0,0,.3)}
        .hero-slide p{font-size:14.5px;opacity:.92;line-height:1.6;margin-bottom:22px;text-shadow:0 1px 4px rgba(0,0,0,.2)}
        .hero-slide-cta{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#1a1a2e;padding:12px 32px;border-radius:28px;font-weight:700;font-size:15px;transition:all .2s;box-shadow:0 4px 14px rgba(255,202,8,.4);text-decoration:none}
        .hero-slide-cta:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,202,8,.5)}
        .hero-dots{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:5}
        .hero-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;border:none;transition:all .2s}
        .hero-dot.active{background:#fff;width:28px;border-radius:5px}
        .hero-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:5;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.2);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .hero-arrow:hover{background:rgba(255,255,255,.35)}
        .hero-arrow.prev{left:16px}
        .hero-arrow.next{right:16px}

        /* MID-PAGE BANNER */
        .mid-banner{margin:0 40px 36px;border-radius:var(--radius);overflow:hidden;position:relative;height:120px;display:flex;align-items:center;padding:0 36px;cursor:pointer;transition:transform .2s}
        .mid-banner:hover{transform:scale(1.01)}
        .mid-banner-content{position:relative;z-index:1;color:#fff;flex:1}
        .mid-banner h3{font-size:20px;font-weight:800;margin-bottom:4px;text-shadow:0 1px 4px rgba(0,0,0,.15)}
        .mid-banner p{font-size:13px;opacity:.9}
        .mid-banner-tag{display:inline-block;background:rgba(255,255,255,.25);padding:3px 12px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
        .mid-banner-icon{font-size:80px;opacity:.12;position:absolute;right:30px;top:50%;transform:translateY(-50%);z-index:0}
        .mid-banner-cta{background:rgba(255,255,255,.95);color:var(--text);padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:pointer;margin-left:auto;position:relative;z-index:1;white-space:nowrap;transition:all .15s}
        .mid-banner-cta:hover{background:#fff;transform:scale(1.04)}

        /* SECTION */
        .section{padding:0 40px;margin-bottom:36px}
        .section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
        .section-title{font-size:20px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:10px}
        .section-title i{font-size:18px}
        .section-more{color:var(--primary);font-size:13px;font-weight:600;display:flex;align-items:center;gap:4px;cursor:pointer;transition:gap .2s}
        .section-more:hover{gap:8px}

        /* FLASH SALE */
        .flash-section{background:linear-gradient(135deg,#dc2626,#ef4444,#f97316);border-radius:var(--radius);padding:24px;margin:0 40px 36px;position:relative;overflow:hidden}
        .flash-section::before{content:'';position:absolute;top:-50%;right:-10%;width:300px;height:300px;background:rgba(255,255,255,.06);border-radius:50%}
        .flash-section::after{content:'';position:absolute;bottom:-40%;left:-5%;width:200px;height:200px;background:rgba(255,255,255,.04);border-radius:50%}
        .flash-hd{display:flex;align-items:center;gap:16px;margin-bottom:18px;position:relative;z-index:1}
        .flash-title{font-size:22px;font-weight:900;color:#fff;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:1px}
        .flash-title i{animation:pulse 1.5s infinite}
        .flash-timer{display:flex;gap:6px;margin-left:16px}
        .flash-timer-box{background:rgba(0,0,0,.3);color:#fff;min-width:42px;height:42px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;font-weight:800;line-height:1}
        .flash-timer-box small{font-size:9px;font-weight:500;opacity:.7;text-transform:uppercase;margin-top:2px}
        .flash-timer-sep{color:rgba(255,255,255,.6);font-size:20px;font-weight:800;display:flex;align-items:center}
        .flash-grid{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;position:relative;z-index:1}
        .flash-grid::-webkit-scrollbar{height:4px}
        .flash-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.3);border-radius:2px}
        .flash-card{min-width:175px;background:#fff;border-radius:var(--radius);overflow:hidden;flex-shrink:0;transition:transform .2s;cursor:pointer;position:relative}
        .flash-card:hover{transform:translateY(-4px)}
        .flash-card-img{width:100%;height:160px;object-fit:cover;display:block}
        .flash-card-badge{position:absolute;top:0;left:0;background:var(--danger);color:#fff;font-size:11px;font-weight:800;padding:4px 10px;border-radius:0 0 8px 0}
        .flash-card-body{padding:10px 12px}
        .flash-card-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px}
        .flash-card-prices{display:flex;align-items:center;gap:6px}
        .flash-card-price{font-size:15px;font-weight:800;color:var(--danger)}
        .flash-card-orig{font-size:11px;color:#bbb;text-decoration:line-through}
        .flash-card-bar{height:4px;background:#fee2e2;border-radius:2px;margin-top:8px;overflow:hidden}
        .flash-card-bar-fill{height:100%;background:linear-gradient(90deg,var(--danger),var(--orange));border-radius:2px;transition:width .5s}

        /* PROMO BANNERS */
        .promo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:0 40px 36px}
        .promo-card{border-radius:var(--radius);overflow:hidden;position:relative;height:140px;display:flex;align-items:center;padding:0 28px;cursor:pointer;transition:transform .2s}
        .promo-card:hover{transform:scale(1.02)}
        .promo-card::before{content:'';position:absolute;inset:0;z-index:0}
        .promo-card-content{position:relative;z-index:1;color:#fff}
        .promo-tag{display:inline-block;background:rgba(255,255,255,.25);padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
        .promo-card h3{font-size:18px;font-weight:800;margin-bottom:4px;text-shadow:0 1px 4px rgba(0,0,0,.2)}
        .promo-card p{font-size:12px;opacity:.9}
        .promo-card-icon{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:56px;opacity:.15;z-index:0}

        /* PRODUCT GRID */
        .prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
        .prod-card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:all .25s;cursor:pointer;position:relative;border:1px solid transparent}
        .prod-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-4px);border-color:var(--primary-light)}
        .prod-card-img-wrap{position:relative;overflow:hidden}
        .prod-card-img{width:100%;height:200px;object-fit:cover;display:block;transition:transform .4s}
        .prod-card:hover .prod-card-img{transform:scale(1.06)}
        .prod-card-overlay{position:absolute;bottom:0;left:0;right:0;padding:8px;display:flex;justify-content:center;gap:8px;transform:translateY(100%);transition:transform .3s;background:linear-gradient(transparent,rgba(0,0,0,.4))}
        .prod-card:hover .prod-card-overlay{transform:translateY(0)}
        .prod-card-overlay button{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.95);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
        .prod-card-overlay button:hover{background:var(--primary);color:#fff;transform:scale(1.1)}
        .prod-card-discount{position:absolute;top:10px;left:10px;background:var(--danger);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px}
        .prod-card-new{position:absolute;top:10px;right:10px;background:var(--success);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px}
        .prod-card-body{padding:14px 16px}
        .prod-card-cat{font-size:11px;color:var(--text-secondary);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
        .prod-card-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:40px;line-height:1.4}
        .prod-card-prices{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
        .prod-card-price{font-size:17px;font-weight:800;color:var(--danger)}
        .prod-card-orig{font-size:12px;color:#bbb;text-decoration:line-through}
        .prod-card-footer{display:flex;align-items:center;justify-content:space-between}
        .prod-card-rating{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--orange)}
        .prod-card-rating span{color:var(--text-secondary);font-weight:500}
        .prod-card-add{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px}
        .prod-card-add:hover{background:var(--primary-dark);transform:scale(1.04)}

        /* FEATURES */
        .features{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:var(--card);border-radius:var(--radius);margin:36px 40px;box-shadow:var(--shadow);overflow:hidden}
        .feature-item{display:flex;align-items:center;gap:14px;padding:20px 24px;border-right:1px solid var(--border)}
        .feature-item:last-child{border-right:none}
        .feature-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
        .feature-text h4{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
        .feature-text p{font-size:11.5px;color:var(--text-secondary)}

        /* CART PANEL */
        .cart-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;backdrop-filter:blur(2px)}
        .cart-overlay.show{display:block}
        .cart-panel{position:fixed;top:0;right:-440px;width:420px;height:100%;background:#fff;z-index:201;box-shadow:-8px 0 30px rgba(0,0,0,.15);display:flex;flex-direction:column;transition:right .35s cubic-bezier(.4,0,.2,1)}
        .cart-panel.show{right:0}
        .cart-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border)}
        .cart-hd h3{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
        .cart-close{background:none;border:none;font-size:24px;cursor:pointer;color:#888;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}
        .cart-close:hover{background:#f5f5f5;color:var(--text)}
        .cart-body{flex:1;overflow-y:auto;padding:16px 24px}
        .cart-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid #f5f5f5;animation:fadeInUp .3s ease}
        .cart-item-img{width:72px;height:72px;border-radius:10px;object-fit:cover;flex-shrink:0;border:1px solid var(--border)}
        .cart-item-info{flex:1;min-width:0}
        .cart-item-name{font-size:13px;font-weight:600;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .cart-item-price{font-size:14px;font-weight:700;color:var(--danger);margin-bottom:6px}
        .cart-qty{display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:8px;overflow:hidden}
        .cart-qty button{width:30px;height:30px;border:none;background:var(--bg);cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:background .1s}
        .cart-qty button:hover{background:#e5e7eb}
        .cart-qty span{width:36px;height:30px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;background:#fff}
        .cart-item-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;align-self:flex-start;padding:4px;transition:color .15s}
        .cart-item-del:hover{color:var(--danger)}
        .cart-empty{text-align:center;padding:60px 0;color:#bbb}
        .cart-empty i{font-size:56px;margin-bottom:14px;display:block;color:#e5e7eb}
        .cart-empty p{font-size:14px;font-weight:500}
        .cart-ft{padding:20px 24px;border-top:1px solid var(--border);background:#fafafa}
        .cart-total-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;color:var(--text-secondary)}
        .cart-total-row.grand{font-size:17px;font-weight:800;color:var(--text);margin-bottom:14px;padding-top:8px;border-top:1px solid var(--border)}
        .cart-total-row.grand span:last-child{color:var(--danger)}
        .cart-checkout-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
        .cart-checkout-btn:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,74,173,.3)}

        /* CHECKOUT */
        .checkout-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
        .checkout-bd.show{display:flex}
        .checkout-modal{background:#fff;border-radius:16px;width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:fadeInUp .3s ease}
        .chk-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--border)}
        .chk-hd h3{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
        .chk-close{background:none;border:none;font-size:24px;cursor:pointer;color:#888;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
        .chk-close:hover{background:#f5f5f5;color:var(--text)}
        .chk-body{padding:24px 28px}
        .chk-group{margin-bottom:16px}
        .chk-group label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
        .chk-group input,.chk-group textarea,.chk-group select{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:13.5px;font-family:inherit;outline:none;transition:border-color .2s}
        .chk-group input:focus,.chk-group textarea:focus{border-color:var(--primary)}
        .chk-row{display:flex;gap:16px}
        .chk-row .chk-group{flex:1}
        .chk-summary{background:var(--bg);border-radius:12px;padding:16px 18px;border:1px solid var(--border)}
        .chk-summary-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--text-secondary)}
        .chk-summary-row.total{font-size:16px;font-weight:800;color:var(--text);border-top:1.5px solid var(--border);padding-top:10px;margin-top:8px}
        .chk-summary-row.total span:last-child{color:var(--danger)}
        .chk-ft{padding:18px 28px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
        .chk-btn{padding:11px 28px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
        .chk-btn-cancel{background:#f5f5f5;color:var(--text-secondary)}
        .chk-btn-cancel:hover{background:#e5e7eb}
        .chk-btn-submit{background:var(--primary);color:#fff}
        .chk-btn-submit:hover{background:var(--primary-dark)}

        /* SUCCESS */
        .success-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
        .success-bd.show{display:flex}

        <!-- PRODUCTS with mid-banners -->
        ${(function(){

                {bg:'linear-gradient(135deg,#1e3a5f,#0d9488,#5eead4)',tag:'Mùa hè',title:'Giải nhiệt mùa hè — Giảm 30% đồ uống',desc:'Tất cả nước giải khát, sữa, trà giảm giá sâu',icon:'fa-solid fa-umbrella-beach',cta:'Mua ngay'}
            ];

                chunk.forEach((p,i)=>{
                    const globalIdx = c+i;
                    const disc=p.origPrice&&p.origPrice>p.price?Math.round((1-p.price/p.origPrice)*100):0;

                });
                html += '</div></div>';
                // Insert mid-banner after each chunk (except last)
                if(c+chunkSize < filtered.length && bannerIdx < midBanners.length){
                    const b = midBanners[bannerIdx];
                    html += `<div class="mid-banner" style="background:${b.bg}"><div class="mid-banner-content"><div class="mid-banner-tag">${b.tag}</div><h3>${b.title}</h3><p>${b.desc}</p></div><i class="${b.icon} mid-banner-icon"></i><button class="mid-banner-cta">${b.cta}</button></div>`;
                    bannerIdx++;

            }
            return html;
        })()}

        <!-- FOOTER -->
        <footer class="store-footer">
            <div class="footer-main">
                <div>
                    <div class="footer-brand"><img src="https://i.imgur.com/vaqJGSc.png" alt="">${config.name}</div>

                        <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="#"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#"><i class="fa-brands fa-tiktok"></i></a>
                        <a href="#"><i class="fa-brands fa-youtube"></i></a>
                    </div>
                </div>
                <div><div class="footer-title">Về chúng tôi</div><div class="footer-links"><a href="#">Giới thiệu</a><a href="#">Tuyển dụng</a><a href="#">Liên hệ hợp tác</a><a href="#">Tin tức</a></div></div>
                <div><div class="footer-title">Chính sách</div><div class="footer-links"><a href="#">Chính sách đổi trả</a><a href="#">Bảo mật thông tin</a><a href="#">Điều khoản sử dụng</a><a href="#">Vận chuyển</a></div></div>
                <div><div class="footer-title">Liên hệ</div><div class="footer-links"><a href="#"><i class="fa-solid fa-phone"></i> ${config.phone}</a><a href="#"><i class="fa-solid fa-envelope"></i> info@hasustore.vn</a><a href="#"><i class="fa-solid fa-location-dot"></i> ${config.address}</a></div></div>
            </div>
            <div class="footer-bottom">© ${new Date().getFullYear()} ${config.name}. Powered by Hasu — All rights reserved.</div>
        </footer>`;
        updateFlashTimer();
        initHeroSlider();
    }

    /* HERO SLIDER */
    let heroIdx=0, heroInterval=null;
    function initHeroSlider(){
        const track=document.getElementById('heroTrack');
        if(!track) return;
        const slides=track.children.length;
        const dots=document.getElementById('heroDots');
        if(dots){dots.innerHTML='';for(let i=0;i<slides;i++){const d=document.createElement('button');d.className='hero-dot'+(i===0?' active':'');d.onclick=()=>goHeroSlide(i);dots.appendChild(d);}}
        clearInterval(heroInterval);
        heroInterval=setInterval(()=>slideHero(1),4500);
    }
    function slideHero(dir){
        const track=document.getElementById('heroTrack');
        if(!track) return;
        const slides=track.children.length;
        heroIdx=(heroIdx+dir+slides)%slides;
        track.style.transform=`translateX(-${heroIdx*100}%)`;
        document.querySelectorAll('.hero-dot').forEach((d,i)=>d.classList.toggle('active',i===heroIdx));
        clearInterval(heroInterval);heroInterval=setInterval(()=>slideHero(1),4500);
    }
    function goHeroSlide(i){heroIdx=i-1;slideHero(1);}

    /* CART */
    function addToCart(id){const p=products.find(x=>x.id===id);if(!p)return;const e=cart.find(c=>c.id===id);if(e)e.qty++;else cart.push({id:p.id,name:p.name,price:p.price,img:p.img,qty:1});saveCart();renderApp();openCart();showToast('Đã thêm vào giỏ hàng!');}
    function saveCart(){localStorage.setItem(CART_KEY,JSON.stringify(cart))}
    function openCart(){renderCart();document.getElementById('cartOverlay').classList.add('show');document.getElementById('cartPanel').classList.add('show')}
    function closeCart(){document.getElementById('cartOverlay').classList.remove('show');document.getElementById('cartPanel').classList.remove('show')}
    function renderCart(){
        const body=document.getElementById('cartBody'),ft=document.getElementById('cartFt');
        document.getElementById('cartCountHd').textContent=cart.reduce((s,c)=>s+c.qty,0);
        if(!cart.length){body.innerHTML='<div class="cart-empty"><i class="fa-solid fa-bag-shopping"></i><p>Giỏ hàng trống</p></div>';ft.style.display='none';return;}
        body.innerHTML=cart.map((c,i)=>`<div class="cart-item"><img class="cart-item-img" src="${c.img||'https://via.placeholder.com/72'}" alt="${c.name}"><div class="cart-item-info"><div class="cart-item-name">${c.name}</div><div class="cart-item-price">${fmt(c.price)}</div><div class="cart-qty"><button onclick="changeQty(${i},-1)">−</button><span>${c.qty}</span><button onclick="changeQty(${i},1)">+</button></div></div><button class="cart-item-del" onclick="removeItem(${i})"><i class="fa-solid fa-xmark"></i></button></div>`).join('');
        const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
        document.getElementById('cartSubtotal').textContent=fmt(total);
        document.getElementById('cartTotalAmt').textContent=fmt(total);ft.style.display='block';
    }
    function changeQty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);saveCart();renderCart();renderApp()}
    function removeItem(i){cart.splice(i,1);saveCart();renderCart();renderApp()}

    /* CHECKOUT */
    function openCheckout(){closeCart();const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
        document.getElementById('chkSummary').innerHTML=`<div style="font-weight:700;margin-bottom:10px;font-size:14px">📋 Tóm tắt đơn hàng</div>${cart.map(c=>`<div class="chk-summary-row"><span>${c.name} × ${c.qty}</span><span style="font-weight:600">${fmt(c.price*c.qty)}</span></div>`).join('')}<div class="chk-summary-row"><span>Phí vận chuyển</span><span style="color:var(--success);font-weight:600">Miễn phí</span></div><div class="chk-summary-row total"><span>Tổng thanh toán</span><span>${fmt(total)}</span></div>`;
        document.getElementById('checkoutBd').classList.add('show')}
    function closeCheckout(){document.getElementById('checkoutBd').classList.remove('show')}
    function placeOrder(){
        const name=document.getElementById('chkName').value.trim(),phone=document.getElementById('chkPhone').value.trim(),addr=document.getElementById('chkAddr').value.trim();
        if(!name){alert('Vui lòng nhập họ tên');return}if(!phone){alert('Vui lòng nhập số điện thoại');return}if(!addr){alert('Vui lòng nhập địa chỉ');return}
        const total=cart.reduce((s,c)=>s+c.price*c.qty,0),code='DH'+Date.now().toString().slice(-6),now=new Date(),dateStr=now.toLocaleDateString('vi-VN')+' '+now.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
        const order={code,date:dateStr,customer:name,phone,address:addr,note:document.getElementById('chkNote').value.trim(),payment:document.getElementById('chkPayment').value,items:cart.map(c=>({name:c.name,qty:c.qty,price:c.price,total:c.price*c.qty})),totalQty:cart.reduce((s,c)=>s+c.qty,0),totalAmount:total,status:'pending',source:'Website',createdAt:now.toISOString()};
        const orders=JSON.parse(localStorage.getItem(ORDERS_KEY)||'[]');orders.unshift(order);localStorage.setItem(ORDERS_KEY,JSON.stringify(orders));
        cart.forEach(c=>{const p=products.find(x=>x.id===c.id);if(p)p.stock=Math.max(0,p.stock-c.qty)});localStorage.setItem(PRODS_KEY,JSON.stringify(products));
        cart=[];saveCart();closeCheckout();document.getElementById('successCode').textContent='Mã đơn: '+code;document.getElementById('successBd').classList.add('show');
    }
    function closeSuccess(){document.getElementById('successBd').classList.remove('show');renderApp()}
    function showToast(msg){const t=document.createElement('div');t.className='toast';t.innerHTML='<i class="fa-solid fa-circle-check"></i>'+msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400)},2500)}

    function toggleWishlist(id, e){
        if(e) e.stopPropagation();
        const p = products.find(x=>x.id===id);
        if(!p) return;
        const idx = wishlist.indexOf(id);
        if(idx>=0){
            wishlist.splice(idx,1);
            showToast('Đã bỏ yêu thích: ' + p.name);
        } else {
            wishlist.push(id);
            showToast('Đã thêm yêu thích: ' + p.name);
        }
        localStorage.setItem('hasu_store_wishlist', JSON.stringify(wishlist));
        renderApp();
    }
    
    function openQuickView(id){
        const p = products.find(x=>x.id===id);
        if(!p) return;
        const catName = (categories.find(c=>c.id===p.cat)||{}).name||'Sản phẩm';
        const isFav = wishlist.includes(p.id);
        document.getElementById('qvContent').innerHTML = `
            <div class="qv-img-col"><img src="${p.img||'https://via.placeholder.com/350?text=SP'}" alt=""></div>
            <div class="qv-info-col">
                <div class="qv-cat">${catName}</div>
                <div class="qv-name">${p.name}</div>
                <div class="qv-prices">
                    <span class="qv-price">${fmt(p.price)}</span>
                    ${p.origPrice&&p.origPrice>p.price?`<span class="qv-orig">${fmt(p.origPrice)}</span>`:''}
                </div>
                <div class="qv-desc">Đây là bản xem trước chi tiết của sản phẩm ${p.name}. Chúng tôi cam kết hàng chính hãng 100%, có hỗ trợ đổi trả trong 7 ngày và miễn phí giao hàng toàn quốc cho đơn hàng từ 300K.</div>
                <div class="qv-actions">
                    <button class="qv-add-btn" onclick="addToCart(${p.id});closeQuickView()"><i class="fa-solid fa-cart-plus"></i> Chọn mua</button>
                    <button class="qv-fav-btn" onclick="toggleWishlist(${p.id});closeQuickView()" title="Yêu thích"><i class="${isFav?'fa-solid':'fa-regular'} fa-heart" ${isFav?'style="color:var(--danger)"':''}></i></button>
                </div>
            </div>`;
        document.getElementById('qvBd').classList.add('show');
    }
    
    function closeQuickView(){
        document.getElementById('qvBd').classList.remove('show');
    }

    document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeCart();closeCheckout();closeSuccess();closeQuickView();}});
    renderApp();
    </script>



<script>
document.addEventListener('DOMContentLoaded', function() {
    var uName = localStorage.getItem('hasu_userName');
    var uEmail = localStorage.getItem('hasu_userEmail');
    if (!uName) {
        window.location.href = 'login.html';
        return;
    }

    var isAdmin = (uEmail === 'admin@hasu.vn' || uEmail === 'tester@hasu.vn');

    function applyReplacements() {
        var walk = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
            acceptNode: function(node) {
                if (['SCRIPT', 'STYLE', 'NOSCRIPT'].includes(node.parentNode.nodeName)) return NodeFilter.FILTER_REJECT;
                return NodeFilter.FILTER_ACCEPT;
            }
        }, false);
        var n;
        while(n = walk.nextNode()) {
            if (n.nodeValue.includes('Tester')) {
                n.nodeValue = n.nodeValue.replace(/Tester/g, uName);
            }
            if (uEmail && n.nodeValue.includes('tester@hasu.vn')) {
                n.nodeValue = n.nodeValue.replace(/tester@hasu\.vn/g, uEmail);
            }
        }
        
        document.querySelectorAll('input').forEach(function(inp) {
            if (inp.value === 'Tester') inp.value = uName;
        });

        // Hide mock history explicitly for newly created non-admin users
        if (!isAdmin) {
            document.querySelectorAll('.activity-item, .tl-history-row, tr').forEach(function(el) {
                var txt = el.textContent;
                // If it contains hardcoded deep mock past dates in the frontend UI
                if (txt.includes('ngày trước') || txt.includes('14/03') || txt.includes('23 ngày trước')) {
                    el.style.display = 'none';
                }
            });
            // If the activity list becomes visually empty, show empty state
            var aList = document.getElementById('activityList');
            if (aList && Array.from(aList.children).filter(function(x){ return x.style.display !== 'none'; }).length === 0) {
                aList.innerHTML = '<div style="padding:30px;text-align:center;color:#bbb">Chưa có hoạt động nào</div>';
            }
        }
    }

    applyReplacements();
    setTimeout(applyReplacements, 150);
    setTimeout(applyReplacements, 500);
});
</script>
